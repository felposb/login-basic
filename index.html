<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site PUCPR</title>
    <link rel="shortcut icon" href="./img/logoicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="forms">
        <div class="logo-container">
            <img class="pucpr-logo" 
            src="./img/logo.svg"
            alt="Logo PUCPR"
            />
        </div>
        <label class="label-email"for="email">Email</label>
        <input id="email" type="email" placeholder="Felipe Lima...">
        <label class="label-senha"for="password">Senha</label>
        <input id="senha" type="password" placeholder="1234...">
        <button id="botao">ENTRAR</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
